        pointValue:
          type: integer
        dailyLimit:
          type: integer
        cooldownMinutes:
          type: integer
          nullable: true
        enabled:
          type: boolean
        icon:
          type: string
          nullable: true
      required:
        - key
        - nameAr
        - pointValue
        - dailyLimit
        - enabled

    Reward:
      type: object
      properties:
        id:
          type: integer
        nameAr:
          type: string
        descriptionAr:
          type: string
        pointCost:
          type: integer
        imageUrl:
          type: string
          nullable: true
        inStock:
          type: boolean
        rewardType:
          type: string
          enum: [digital, physical]
      required:
        - id
        - nameAr
        - descriptionAr
        - pointCost
        - rewardType

    Redemption:
      type: object
      properties:
        id:
          type: integer
        rewardId:
          type: integer
        pointsSpent:
          type: integer
        status:
          type: string
          enum: [pending, fulfilled, cancelled]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - rewardId
        - pointsSpent
        - status
        - createdAt

    Achievement:
      type: object
      properties:
        id:
          type: integer
        key:
          type: string
        nameAr:
          type: string
        descriptionAr:
          type: string
        icon:
          type: string
          nullable: true
        pointReward:
          type: integer
        isHidden:
          type: boolean
      required:
        - id
        - key
        - nameAr
        - descriptionAr
        - pointReward

    UserAchievement:
      type: object
      properties:
        key:
          type: string
        nameAr:
          type: string
        icon:
          type: string
          nullable: true
        awardedAt:
          type: string
          format: date-time
      required:
        - key
        - nameAr
        - awardedAt

    LeaderboardEntry:
      type: object
      properties:
        rank:
          type: integer
        userId:
          type: integer
        name:
          type: string
        points:
          type: integer
        tierKey:
          type: string
        achievements:
          type: integer
        referrals:
          type: integer
      required:
        - rank
        - userId
        - name
        - points

    LeaderboardResponse:
      type: object
      properties:
        leaderboard:
          type: array
          items:
            $ref: "#/components/schemas/LeaderboardEntry"
        myRank:
          type: object
          nullable: true
          properties:
            rank:
              type: integer
            points:
              type: integer
            outOf:
              type: integer

    MyRankResponse:
      type: object
      properties:
        rank:
          type: integer
        points:
          type: integer
        totalUsers:
          type: integer
      required:
        - rank
        - points
        - totalUsers

    AdminLoyaltyStats:
      type: object
