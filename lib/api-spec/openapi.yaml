openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ZU Connect API - منصة طلبة جامعة الزاوية
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: news
    description: News and activities
  - name: courses
    description: Training courses
  - name: members
    description: Union members directory
  - name: colleges
    description: University colleges/faculties
  - name: library
    description: Digital library resources
  - name: planner
    description: Activity planner events
  - name: chat
    description: Discussion rooms and messages
  - name: suggestions
    description: Suggestions and complaints
  - name: volunteers
    description: Volunteer registrations
  - name: faq
    description: Frequently asked questions
  - name: stats
    description: Platform statistics
  - name: referrals
    description: Referral system
  - name: loyalty
    description: Loyalty points, rewards, and leaderboard
  - name: admin-loyalty
    description: Admin loyalty management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get platform statistics
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  /news:
    get:
      operationId: listNews
      tags: [news]
      summary: List news and activities
      parameters:
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of news items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NewsItem"
    post:
      operationId: createNews
      tags: [news]
      summary: Create a news item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewsInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsItem"

  /news/{id}:
    get:
      operationId: getNews
      tags: [news]
      summary: Get news item by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: News item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsItem"

  /courses:
    get:
      operationId: listCourses
      tags: [courses]
      summary: List training courses
      parameters:
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Course"
    post:
      operationId: createCourse
      tags: [courses]
      summary: Create a course
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"

  /courses/{id}/enroll:
    post:
      operationId: enrollCourse
      tags: [courses]
      summary: Enroll in a course
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnrollmentInput"
      responses:
        "200":
          description: Enrollment result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"

  /courses/{id}/unenroll:
    post:
      operationId: unenrollCourse
      tags: [courses]
      summary: Unenroll from a course
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnrollmentInput"
      responses:
        "200":
          description: Unenrollment result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"

  /members:
    get:
      operationId: listMembers
      tags: [members]
      summary: List union members
      parameters:
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"

  /colleges:
    get:
      operationId: listColleges
      tags: [colleges]
      summary: List university colleges
      responses:
        "200":
          description: List of colleges
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/College"

  /library:
    get:
      operationId: listLibrary
      tags: [library]
      summary: List library resources
      parameters:
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of library resources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LibraryResource"

  /planner:
    get:
      operationId: listPlanner
      tags: [planner]
      summary: List planned activities
      parameters:
        - name: month
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of planned activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlannerEvent"

  /chat/rooms:
    get:
      operationId: listChatRooms
      tags: [chat]
      summary: List discussion rooms
      responses:
        "200":
          description: List of chat rooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatRoom"

  /chat/rooms/{roomId}/messages:
    get:
      operationId: listChatMessages
      tags: [chat]
      summary: Get messages in a room
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send a message to a room
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"

  /suggestions:
    post:
      operationId: createSuggestion
      tags: [suggestions]
      summary: Submit a suggestion or complaint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuggestionInput"
      responses:
        "201":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Suggestion"

  /volunteers:
    post:
      operationId: createVolunteer
      tags: [volunteers]
      summary: Register as a volunteer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VolunteerInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Volunteer"

  /faq:
    get:
      operationId: listFaq
      tags: [faq]
      summary: List FAQ items
      responses:
        "200":
          description: List of FAQ items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FaqItem"

  /referrals/generate:
    post:
      operationId: generateReferralCode
      tags: [referrals]
      summary: Generate a referral code
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Referral code generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralCodeResponse"
        "401":
          description: Unauthorized

  /referrals/regenerate:
    post:
      operationId: regenerateReferralCode
      tags: [referrals]
      summary: Regenerate referral code (invalidates old)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: New referral code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralCodeResponse"
        "401":
          description: Unauthorized

  /referrals/claim:
    post:
      operationId: claimReferral
      tags: [referrals]
      summary: Apply a referral code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimReferralBody"
      responses:
        "200":
          description: Referral claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimReferralResponse"
        "400":
          description: Invalid claim
        "404":
          description: Code not found

  /referrals/stats:
    get:
      operationId: getReferralStats
      tags: [referrals]
      summary: Get referral stats for authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Referral stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralStatsResponse"
        "401":
          description: Unauthorized

  /loyalty/stats:
    get:
      operationId: getLoyaltyStats
      tags: [loyalty]
      summary: Get current user's loyalty dashboard data
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Loyalty stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoyaltyStats"

  /loyalty/transactions:
    get:
      operationId: listTransactions
      tags: [loyalty]
      summary: Get paginated points history with filters
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: actionType
          in: query
          schema:
            type: string
          description: Filter by action type
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Paginated transactions
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactions:
                    type: array
                    items:
                      $ref: "#/components/schemas/PointsTransaction"
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      totalPages:
                        type: integer
                      total:
                        type: integer

  /loyalty/actions:
    get:
      operationId: listEarningActions
      tags: [loyalty]
      summary: List available earning actions with point values
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of earning actions
          content:
            application/json:
              schema:
                type: object
                properties:
                  actions:
                    type: array
                    items:
                      $ref: "#/components/schemas/EarningAction"

  /loyalty/actions/{key}/claim:
    post:
      operationId: claimPoints
      tags: [loyalty]
      summary: Award points for completing an action
      security:
        - bearerAuth: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                idempotencyKey:
                  type: string
      responses:
        "200":
          description: Points awarded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  pointsAwarded:
                    type: integer
                  newBalance:
                    type: integer
        "429":
          description: Daily limit reached

  /loyalty/rewards:
    get:
      operationId: listRewards
      tags: [loyalty]
      summary: Browse rewards catalog
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Rewards catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  rewards:
                    type: array
                    items:
                      $ref: "#/components/schemas/Reward"

  /loyalty/rewards/{id}/redeem:
    post:
      operationId: redeemReward
      tags: [loyalty]
      summary: Redeem points for a reward
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Redemption result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  redemption:
                    $ref: "#/components/schemas/Redemption"
        "400":
          description: Insufficient points or out of stock

  /loyalty/leaderboard:
    get:
      operationId: getLeaderboard
      tags: [loyalty]
      summary: Get platform leaderboard
      parameters:
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [points, referrals, achievements]
            default: points
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardResponse"

  /loyalty/leaderboard/my-rank:
    get:
      operationId: getMyRank
      tags: [loyalty]
      summary: Get current user's rank
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User rank
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyRankResponse"

  /admin/loyalty/stats:
    get:
      operationId: getAdminLoyaltyStats
      tags: [admin-loyalty]
      summary: Get overall loyalty analytics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Admin loyalty analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoyaltyStats"

  /admin/loyalty/actions/{key}:
    get:
      operationId: adminListActions
      tags: [admin-loyalty]
      summary: List all earning actions
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All earning actions
    put:
      operationId: adminUpdateAction
      tags: [admin-loyalty]
      summary: Update an earning action
      security:
        - bearerAuth: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string

  /admin/loyalty/users/{userId}/adjust:
    post:
      operationId: adminAdjustPoints
      tags: [admin-loyalty]
      summary: Manually adjust a user's points
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [points, reason]
              properties:
                points:
                  type: integer
                reason:
                  type: string
      responses:
        "200":
          description: Points adjusted
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: integer
                  previousPoints:
                    type: integer
                  newPoints:
                    type: integer
                  change:
                    type: integer

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    PlatformStats:
      type: object
      properties:
        totalStudents:
          type: integer
        totalColleges:
          type: integer
        totalActivities:
          type: integer
        totalLibraryFiles:
          type: integer
        totalCourses:
          type: integer
        totalMembers:
          type: integer
      required:
        - totalStudents
        - totalColleges
        - totalActivities
        - totalLibraryFiles
        - totalCourses
        - totalMembers

    NewsItem:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        body:
          type: string
        category:
          type: string
        date:
          type: string
        viewCount:
          type: integer
      required:
        - id
        - title
        - body
        - category
        - date
        - viewCount

    NewsInput:
      type: object
      properties:
        title:
          type: string
        body:
          type: string
        category:
          type: string
      required:
        - title
        - body
        - category

    Course:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        instructor:
          type: string
        duration:
          type: string
        level:
          type: string
        category:
          type: string
        totalSeats:
          type: integer
        enrolledCount:
          type: integer
        colorScheme:
          type: integer
      required:
        - id
        - title
        - description
        - instructor
        - duration
        - level
        - category
        - totalSeats
        - enrolledCount
        - colorScheme

    CourseInput:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        instructor:
          type: string
        duration:
          type: string
        level:
          type: string
        category:
          type: string
        totalSeats:
          type: integer
        colorScheme:
          type: integer
      required:
        - title
        - description
        - instructor
        - duration
        - level
        - category
        - totalSeats
        - colorScheme

    EnrollmentInput:
      type: object
      properties:
        studentId:
          type: string
      required:
        - studentId

    Member:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          type: string
        department:
          type: string
        year:
          type: string
        category:
          type: string
        initials:
          type: string
      required:
        - id
        - name
        - role
        - department
        - year
        - category
        - initials

    College:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        studentCount:
          type: integer
        hasNews:
          type: boolean
        hasSchedules:
          type: boolean
        hasFiles:
          type: boolean
        hasActivities:
          type: boolean
        icon:
          type: string
      required:
        - id
        - name
        - studentCount
        - hasNews
        - hasSchedules
        - hasFiles
        - hasActivities
        - icon

    LibraryResource:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        subtitle:
          type: string
        type:
          type: string
        rating:
          type: number
        downloadCount:
          type: integer
        college:
          type: string
      required:
        - id
        - title
        - subtitle
        - type
        - rating
        - downloadCount
        - college

    PlannerEvent:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        date:
          type: string
        month:
          type: string
        icon:
          type: string
      required:
        - id
        - title
        - description
        - date
        - month
        - icon

    ChatRoom:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        onlineCount:
          type: integer
        icon:
          type: string
      required:
        - id
        - name
        - description
        - onlineCount
        - icon

    ChatMessage:
      type: object
      properties:
        id:
          type: integer
        roomId:
          type: integer
        sender:
          type: string
        message:
          type: string
        isMe:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - roomId
        - sender
        - message
        - isMe
        - createdAt

    ChatMessageInput:
      type: object
      properties:
        sender:
          type: string
        message:
          type: string
        isMe:
          type: boolean
      required:
        - sender
        - message
        - isMe

    SuggestionInput:
      type: object
      properties:
        name:
          type: ["string", "null"]
        college:
          type: ["string", "null"]
        type:
          type: string
        message:
          type: string
      required:
        - type
        - message

    Suggestion:
      type: object
      properties:
        id:
          type: integer
        name:
          type: ["string", "null"]
        college:
          type: ["string", "null"]
        type:
          type: string
        message:
          type: string
        createdAt:
          type: string
      required:
        - id
        - type
        - message
        - createdAt

    VolunteerInput:
      type: object
      properties:
        name:
          type: string
        college:
          type: string
        phone:
          type: string
        area:
          type: string
      required:
        - name
        - college
        - phone
        - area

    Volunteer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        college:
          type: string
        phone:
          type: string
        area:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - college
        - phone
        - area
        - createdAt

    FaqItem:
      type: object
      properties:
        id:
          type: integer
        question:
          type: string
        answer:
          type: string
        category:
          type: string
      required:
        - id
        - question
        - answer
        - category

    ReferralCodeResponse:
      type: object
      properties:
        code:
          type: string
        shareUrl:
          type: string
      required:
        - code
        - shareUrl

    ClaimReferralBody:
      type: object
      properties:
        code:
          type: string
        refereeIdentifier:
          type: string
      required:
        - code
        - refereeIdentifier

    ClaimReferralResponse:
      type: object
      properties:
        success:
          type: boolean
        pointsAwarded:
          type: integer
        referrerNewTotal:
          type: integer
      required:
        - success
        - pointsAwarded
        - referrerNewTotal

    ReferralStats:
      type: object
      properties:
        totalReferrals:
          type: integer
        completedReferrals:
          type: integer
        totalPointsEarned:
          type: integer
        monthlyPointsEarned:
          type: integer
        rank:
          type: integer
      required:
        - totalReferrals
        - completedReferrals
        - totalPointsEarned
        - monthlyPointsEarned

    ReferralRecord:
      type: object
      properties:
        id:
          type: integer
        refereeName:
          type: string
          nullable: true
        refereeIdentifier:
          type: string
          nullable: true
        status:
          type: string
        pointsAwarded:
          type: integer
        firstContactAt:
          type: string
          nullable: true
        completedAt:
          type: string
          nullable: true
        rewardedAt:
          type: string
          nullable: true
      required:
        - id
        - status
        - pointsAwarded

    LoyaltyStats:
      type: object
      properties:
        points:
          type: integer
        tier:
          type: object
          properties:
            key:
              type: string
            name_ar:
              type: string
            color:
              type: string
            benefits_ar:
              type: array
              items:
                type: string
        nextTier:
          type: object
          nullable: true
          properties:
            key:
              type: string
            name_ar:
              type: string
            pointsNeeded:
              type: integer
            progressPercent:
              type: number
        recentTransactions:
          type: array
          items:
            $ref: "#/components/schemas/PointsTransaction"
        recentAchievements:
          type: array
          items:
            $ref: "#/components/schemas/UserAchievement"
        availableRewardsCount:
          type: integer

    PointsTransaction:
      type: object
      properties:
        id:
          type: integer
        actionType:
          type: string
        actionLabel:
          type: string
        pointsChange:
          type: integer
        balanceAfter:
          type: integer
        referenceId:
          type: integer
          nullable: true
        adminNote:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - actionType
        - pointsChange
        - balanceAfter
        - createdAt

    EarningAction:
      type: object
      properties:
        key:
          type: string
        nameAr:
          type: string
        descriptionAr:
