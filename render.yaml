services:
  - type: web
    name: zu-connect
    env: node
    buildCommand: pnpm install && pnpm run --filter @workspace/zu-connect build && pnpm run --filter @workspace/api-server build
    startCommand: pnpm run --filter @workspace/api-server start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: BASE_PATH
        value: /
      - key: DATABASE_URL
        sync: false
